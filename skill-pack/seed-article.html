<!DOCTYPE html>
<html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --preview-scale: 0.38;
      --ink: #1a1a1a;
      --muted: #555;
      --accent: #0f766e;
      --accent-soft: #ccfbf1;
      --page-bg: #ffffff;
      --cover-bg: linear-gradient(160deg, #f0fdfa 0%, #ffffff 45%, #ecfeff 100%);
    }

    body {
      background: #e8e8e8;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
    }

    .doc-scroll { overflow: auto; padding: 24px; }

    #doc {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 24px;
      width: max-content;
      min-width: 100%;
      justify-content: center;
    }

    .page {
      width: {{PAGE_W}}px;
      min-height: {{PAGE_H}}px;
      background: var(--page-bg);
      padding: 80px 72px;
      overflow: visible;
      flex-shrink: 0;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
      position: relative;
    }

    .page-wrap {
      flex-shrink: 0;
      width: {{PAGE_W}}px;
      transform: scale(var(--preview-scale));
      transform-origin: top left;
      margin-right: calc({{PAGE_W}}px * (var(--preview-scale) - 1));
    }

    .page-wrap.is-exporting {
      transform: none !important;
      position: fixed !important;
      left: -9999px !important;
      top: 0 !important;
      margin: 0 !important;
    }

    .page.page--cover {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: {{PAGE_H}}px;
      padding: 96px 72px;
      background: var(--cover-bg);
    }

    .block { width: 100%; }

    .kicker {
      display: inline-block;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 10px 20px;
      border-radius: 999px;
      margin-bottom: 36px;
    }

    .hero-title {
      font-size: 88px;
      font-weight: 800;
      line-height: 1.15;
      color: var(--ink);
      margin-bottom: 32px;
    }

    .hero-sub {
      font-size: 42px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--muted);
      max-width: 900px;
    }

    .section-title {
      font-size: 56px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--ink);
      margin-bottom: 32px;
    }

    .feature-list {
      list-style: none;
      margin: 0 0 40px;
    }

    .feature-list li {
      position: relative;
      font-size: 38px;
      line-height: 1.55;
      color: #333;
      margin-bottom: 20px;
      padding-left: 48px;
    }

    .feature-list li::before {
      content: "•";
      position: absolute;
      left: 8px;
      color: var(--accent);
      font-weight: 700;
    }

    .fig-wrap {
      margin-top: 24px;
    }
  </style>
</head>
<body>

  <div class="doc-scroll">
    <div id="doc">

      <div class="page-wrap">
        <div class="page page--cover" data-page="1">
          <div class="block kicker" data-id="cover-kicker">示例 · 入门</div>
          <h1 class="block hero-title" data-id="cover-title">Article to Pic</h1>
          <p class="block hero-sub" data-id="cover-sub">本地写稿，网站预览导出</p>
        </div>
      </div>

      <div class="page-wrap">
        <div class="page" data-page="2">
          <h2 class="block section-title" data-id="p2-title">功能说明</h2>
          <ul class="block feature-list" data-id="p2-list">
            <li>三区文稿：封面 / 正文 / 备注</li>
            <li>网站预览排版，导出 {{CANVAS_LABEL}} PNG</li>
            <li>工作包文件夹双向同步</li>
          </ul>
          <p class="block" data-id="p2-tip" style="font-size:34px;line-height:1.6;color:#666;">
            直接改这份示例，或替换为自己的主题与配图。
          </p>
        </div>
      </div>

      <div class="page-wrap">
        <div class="page" data-page="3" style="display:flex;flex-direction:column;justify-content:center;padding:48px 56px;">
          <div class="block fig-wrap" data-id="follow-img"
               data-asset-id="{{ASSET_ID}}"
               data-width="{{WIDTH}}" data-height="{{HEIGHT}}">
            <img data-asset-id="{{ASSET_ID}}"
                 data-width="{{WIDTH}}" data-height="{{HEIGHT}}"
                 alt="关注个人账号"
                 style="display:block;width:100%;height:auto;border-radius:16px;">
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    (function () {
      var PAGE_W = {{PAGE_W}}
      function getPreviewScale() {
        var raw = getComputedStyle(document.documentElement).getPropertyValue('--preview-scale').trim()
        var n = parseFloat(raw)
        return Number.isFinite(n) ? n : 0.38
      }
      function updatePreviewLayout() {
        var scale = getPreviewScale()
        document.querySelectorAll('.page-wrap').forEach(function (wrap) {
          var h = wrap.offsetHeight
          wrap.style.marginBottom = String(h * (scale - 1)) + 'px'
          wrap.style.marginRight = String(PAGE_W * (scale - 1)) + 'px'
        })
      }
      window.addEventListener('load', updatePreviewLayout)
      window.addEventListener('resize', updatePreviewLayout)
      if (typeof ResizeObserver !== 'undefined') {
        var ro = new ResizeObserver(updatePreviewLayout)
        document.querySelectorAll('.page-wrap').forEach(function (wrap) { ro.observe(wrap) })
      }
    })()
  </script>

</body></html>
